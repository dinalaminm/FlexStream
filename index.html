<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlexStream</title>
<meta property="og:title" content="FlexStream — Movies, Anime & Videos">
<meta property="og:description" content="Watch amazing movies, anime and videos for free!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* ══ VARIABLES ══ */
:root {
  --black:   #050508;
  --surface: #0f0f16;
  --card:    #13131c;
  --card2:   #1a1a26;
  --border:  #1e1e2e;
  --border2: #28283a;
  --accent:  #e63946;
  --accent2: #ff6b6b;
  --gold:    #ffd166;
  --teal:    #06d6a0;
  --blue:    #4361ee;
  --text:    #f0f0f8;
  --sub:     #a0a0c0;
  --muted:   #5a5a7a;
  --r:       12px;
  --nav-h:   68px;
}

/* ══ RESET ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: .18;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
}

/* ══ ANIMATIONS ══ */
@keyframes fadein    { from{opacity:0} to{opacity:1} }
@keyframes slideup   { from{transform:translateY(28px) scale(.96);opacity:0} to{transform:none;opacity:1} }
@keyframes slidedown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
@keyframes cardin    { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
@keyframes shim      { 0%,100%{background:var(--surface);opacity:.5} 50%{background:var(--card2);opacity:1} }
@keyframes pulse     { 0%,100%{transform:scale(1)} 50%{transform:scale(.92)} }

/* ══ WELCOME MODAL ══ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(5,5,8,.95);
  backdrop-filter: blur(16px); z-index: 8000;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-bg.show { display: flex; animation: fadein .35s ease; }
.modal-box {
  background: var(--card); border: 1px solid var(--border2); border-radius: 24px;
  width: 100%; max-width: 360px; padding: 32px 24px 26px;
  text-align: center; position: relative; overflow: hidden;
  animation: slideup .42s cubic-bezier(.34,1.56,.64,1);
}
.modal-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--gold), var(--teal));
}
.modal-logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 3px;
  background: linear-gradient(130deg,#fff 30%,var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
}
.modal-desc  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.modal-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.social-btn  {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  padding: 13px; border-radius: 12px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600; color: #fff; text-decoration: none;
  margin-bottom: 9px; transition: all .2s;
}
.social-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-fb  { background: #1877f2; }
.btn-grp { background: linear-gradient(135deg,#00c853,#00897b); }
.btn-enter {
  width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border2);
  color: var(--sub); border-radius: 12px; margin-top: 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; transition: all .2s;
}
.btn-enter:hover { border-color: var(--accent); color: var(--accent); }

/* ══ HEADER ══ */
.app-header {
  position: sticky; top: 0; z-index: 500;
  background: rgba(5,5,8,.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
}
.header-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px 11px; }
.brand {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px;
  background: linear-gradient(130deg,#fff 40%,var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hright  { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  background: none; border: none; cursor: pointer; color: var(--sub);
  padding: 7px; border-radius: 8px; transition: .2s; display: flex; align-items: center;
}
.icon-btn:hover { color: var(--text); background: var(--surface); }
.hbadge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; letter-spacing: 1px; }

/* Search */
.search-bar { padding: 0 14px 12px; display: none; }
.search-bar.open { display: block; animation: slidedown .22s ease; }
.search-wrap { position: relative; }
.search-ico  { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-input {
  width: 100%; padding: 10px 12px 10px 38px; background: var(--surface);
  border: 1px solid var(--border2); color: var(--text); border-radius: 50px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: .2s;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,57,70,.1); }
.search-input::placeholder { color: var(--muted); }

/* Category Pills */
.cat-bar-wrap { padding: 10px 12px 2px; }
.cat-bar { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; }
.cat-bar::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); padding: 7px 14px; border-radius: 50px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; position: relative; overflow: hidden;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.cat-pill::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  opacity: 0; transition: opacity .25s;
}
.cat-pill.active { border-color: transparent; color: #fff; box-shadow: 0 4px 18px rgba(230,57,70,.4); }
.cat-pill.active::before { opacity: 1; }
.cat-pill span, .cat-pill-icon { position: relative; z-index: 1; }
.cat-pill-icon { font-size: 14px; }
.cat-pill-sk   { flex-shrink: 0; height: 34px; border-radius: 50px; animation: shim 1.4s infinite; }

/* ══ BANNER AD SLOT ══ */
.ad-banner-slot {
  width: 100%; display: none; flex-direction: column; align-items: center;
  background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 8px 0 6px; overflow: hidden;
}
.ad-banner-slot.show { display: flex; }
.ad-slot-label { font-size: 9px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
#bannerAdInner { display: flex; justify-content: center; align-items: center; min-height: 50px; width: 100%; }

/* ══ HOME VIEW ══ */
#homeView { padding-bottom: calc(var(--nav-h) + 16px); }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 14px 10px; }
.section-title  { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.section-count  { font-size: 11px; color: var(--muted); background: var(--surface); padding: 3px 8px; border-radius: 20px; }

.video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px 10px; }
@media (min-width:480px) { .video-grid { grid-template-columns: repeat(3,1fr); } }
@media (min-width:768px) { .video-grid { grid-template-columns: repeat(4,1fr); } }

/* Video Card */
.vcard {
  background: var(--card); border-radius: var(--r); overflow: hidden;
  cursor: pointer; border: 1px solid var(--border);
  transition: transform .2s, box-shadow .2s; animation: cardin .35s ease both;
}
.vcard:hover  { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.55); }
.vcard:active { transform: scale(.97); }
.thumb-wrap { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; }
.thumb-img  { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
.vcard:hover .thumb-img { transform: scale(1.06); }
.thumb-play {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.3); opacity: 0; transition: opacity .2s;
}
.vcard:hover .thumb-play { opacity: 1; }
.play-circle {
  width: 44px; height: 44px; background: rgba(230,57,70,.9); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(230,57,70,.55); animation: pulse 2s infinite;
}
.thumb-cat {
  position: absolute; top: 6px; left: 6px; padding: 3px 8px; border-radius: 6px;
  font-size: 9px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase;
}
.cat-movie  { background: rgba(67,97,238,.85); color: #fff; }
.cat-anime  { background: rgba(255,180,0,.9);  color: #111; }
.cat-videos { background: rgba(230,57,70,.85); color: #fff; }
.cat-custom { background: rgba(6,214,160,.85); color: #111; }
.thumb-views {
  position: absolute; bottom: 5px; right: 6px;
  background: rgba(0,0,0,.72); color: #fff; font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 20px; display: flex; align-items: center; gap: 3px; backdrop-filter: blur(4px);
}
.vcard-info  { padding: 9px 10px 11px; }
.vcard-title {
  font-size: 12px; font-weight: 600; line-height: 1.4; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* Skeleton */
.sk-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
@media (min-width:480px) { .sk-grid { grid-template-columns: repeat(3,1fr); } }
.sk-card  { background: var(--card); border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); }
.sk-thumb { aspect-ratio: 16/9; animation: shim 1.4s infinite; }
.sk-body  { padding: 9px 10px 11px; }
.sk-line  { height: 10px; border-radius: 5px; animation: shim 1.4s infinite; margin-bottom: 6px; }
.sk-line.w70 { width: 70%; } .sk-line.w50 { width: 50%; }
.empty-msg    { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-msg .ei{ font-size: 44px; margin-bottom: 12px; }

/* ══ PLAYER VIEW ══ */
#playerView      { display: none; padding-bottom: calc(var(--nav-h) + 16px); }
#playerView.show { display: block; animation: fadein .3s ease; }
.player-back {
  display: flex; align-items: center; gap: 8px; padding: 12px 14px 10px;
  cursor: pointer; color: var(--sub); font-size: 14px; font-weight: 600;
  background: none; border: none; font-family: 'DM Sans', sans-serif; transition: .2s;
}
.player-back:hover { color: var(--text); }
.player-video-wrap { background: #000; width: 100%; position: relative; }
#mainVideo { width: 100%; aspect-ratio: 16/9; display: block; background: #000; object-fit: contain; }

/* ══ AD OVERLAY ══ */
#adOverlay {
  display: none; position: absolute; inset: 0; z-index: 50;
  background: #000; flex-direction: column; align-items: center; justify-content: center;
}
#adOverlay.show { display: flex; }
#adOverlayZone {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
#adOverlayZone iframe { width: 100%; height: 100%; border: none; }
.ad-tag {
  position: absolute; top: 8px; left: 8px; z-index: 10;
  background: rgba(0,0,0,.75); color: var(--gold);
  font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 5px; backdrop-filter: blur(4px);
}
.ad-skip-btn {
  position: absolute; bottom: 10px; right: 10px; z-index: 10;
  background: rgba(0,0,0,.82); color: #fff;
  border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
  padding: 8px 16px; font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif; backdrop-filter: blur(6px);
  transition: all .2s; display: flex; align-items: center; gap: 7px;
}
.ad-skip-btn:hover:not(:disabled) { background: rgba(230,57,70,.9); border-color: var(--accent); }
.ad-skip-btn:disabled { opacity: .5; cursor: not-allowed; }
.ad-countdown {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  border-radius: 5px; padding: 2px 7px; font-size: 11px; min-width: 22px;
}

/* ══ PLAYER INFO ══ */
.player-info    { padding: 14px 14px 12px; }
.player-cat     { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.player-title   { font-size: 17px; font-weight: 700; line-height: 1.35; margin-bottom: 6px; }
.player-views   { font-size: 12px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 5px; }
.player-actions { display: flex; gap: 9px; margin-bottom: 2px; }
.p-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 11px 10px; border-radius: 10px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700; border: none; cursor: pointer; text-decoration: none; transition: all .2s;
}
.p-btn-share { background: var(--surface); color: var(--sub); border: 1px solid var(--border2); }
.p-btn-share:hover { border-color: var(--teal); color: var(--teal); }
.p-btn-dl    { background: var(--accent); color: #fff; box-shadow: 0 4px 16px rgba(230,57,70,.3); }
.p-btn-dl:hover { background: #c1121f; transform: translateY(-1px); }

/* ══ SUGGESTED ══ */
.divider   { height: 1px; background: var(--border); margin: 16px 14px 14px; }
.sug-label { padding: 0 14px 10px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.sug-list  { display: flex; flex-direction: column; gap: 10px; padding: 0 10px; }
.sug-card  { display: flex; gap: 10px; background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: all .2s; }
.sug-card:hover  { background: var(--card2); border-color: var(--border2); transform: translateX(3px); }
.sug-card:active { transform: scale(.98); }
.sug-thumb { position: relative; width: 120px; flex-shrink: 0; aspect-ratio: 16/9; background: #000; overflow: hidden; }
.sug-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sug-info  { flex: 1; padding: 9px 10px 9px 0; min-width: 0; }
.sug-title {
  font-size: 12px; font-weight: 600; line-height: 1.4; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px;
}
.sug-cat   { display: inline-block; padding: 2px 6px; border-radius: 5px; font-size: 9px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; }
.sug-views { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* ══ BOTTOM NAV ══ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h); background: rgba(5,5,8,.96);
  backdrop-filter: blur(24px) saturate(1.4); border-top: 1px solid var(--border);
  display: flex; padding: 0 4px env(safe-area-inset-bottom,0px); z-index: 400;
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 600; color: var(--muted); padding: 8px 0 6px;
  transition: color .2s; position: relative;
}
.bnav-icon {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.bnav-icon svg { transition: all .25s; }
.bnav-item.active { color: var(--accent); }
.bnav-item.active .bnav-icon { background: rgba(230,57,70,.14); transform: translateY(-2px) scale(1.1); }
.bnav-item.active .bnav-icon svg { filter: drop-shadow(0 2px 8px rgba(230,57,70,.6)); }
.bnav-item.active::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* ══ TOAST ══ */
#toast {
  position: fixed; bottom: calc(var(--nav-h)+10px); left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--card); color: var(--text); border: 1px solid var(--border2);
  padding: 11px 22px; border-radius: 50px; font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 30px rgba(0,0,0,.5); opacity: 0;
  transition: all .35s cubic-bezier(.34,1.56,.64,1);
  z-index: 7000; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ WELCOME MODAL ══ -->
<div class="modal-bg" id="welcomeModal">
  <div class="modal-box">
    <div class="modal-logo">FlexStream</div>
    <p class="modal-desc">আমাদের কমিউনিটিতে যোগ দিন ও আপডেট পান</p>
    <div class="modal-label">Join Us</div>
    <a href="#" id="fbPageLink" class="social-btn btn-fb" target="_blank" rel="noopener">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook Page
    </a>
    <a href="#" id="fbGroupLink" class="social-btn btn-grp" target="_blank" rel="noopener">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      Facebook Group
    </a>
    <button class="btn-enter" id="enterBtn">অ্যাপে প্রবেশ করুন →</button>
  </div>
</div>

<!-- ══ HEADER ══ -->
<header class="app-header">
  <div class="header-row">
    <div class="brand">FlexStream</div>
    <div class="hright">
      <button class="icon-btn" id="searchToggle" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <div class="hbadge">FREE</div>
    </div>
  </div>
  <div class="search-bar" id="searchBar">
    <div class="search-wrap">
      <span class="search-ico">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="search" class="search-input" id="searchInput"
        placeholder="Search movies, anime..." oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="cat-bar-wrap">
    <div class="cat-bar" id="catBar">
      <div class="cat-pill-sk sk-card" style="width:56px"></div>
      <div class="cat-pill-sk sk-card" style="width:80px"></div>
      <div class="cat-pill-sk sk-card" style="width:72px"></div>
      <div class="cat-pill-sk sk-card" style="width:64px"></div>
    </div>
  </div>
</header>

<!-- ══ HOME VIEW ══ -->
<div id="homeView">
  <!-- Banner Ad — shown/hidden based on Firestore config -->
  <div class="ad-banner-slot" id="bannerAdSlot">
    <div class="ad-slot-label"></div>
    <div id="bannerAdInner"></div>
  </div>
  <!-- Video Grid -->

/* ══════════════════════════════════
   AD ENGINE
   Firestore doc: settings/ads
   Fields:
     socialBarScript  — full <script> HTML
     bannerScript     — full <script> HTML
     overlayScript    — full <script> HTML
     directLink       — Adsterra Direct Link URL
     socialBarEnabled — bool
     bannerEnabled    — bool
     overlayEnabled   — bool
     popunderEnabled  — bool
     skipDelay        — number (seconds, default 5)
     popunderCooldown — number (seconds, default 60)
══════════════════════════════════ */

/** Safely inject ad HTML + re-execute <script> tags */
function injectScript(container, html) {
  if (!html || !container) return;
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  Array.from(wrap.childNodes).forEach(node => {
    if (node.nodeName === 'SCRIPT') {
      const s = document.createElement('script');
      s.type = node.type || 'text/javascript';
      if (node.src)  s.src = node.src;
      else           s.textContent = node.textContent;
      if (node.dataset?.cfasync !== undefined)
        s.dataset.cfasync = node.dataset.cfasync;
      container.appendChild(s);
    } else {
      container.appendChild(node.cloneNode(true));
    }
  });
}

/** Social Bar — appended to <body> once */
function applySocialBar(script) {
  if (!script) return;
  let el = document.getElementById('_sb_wrap');
  if (!el) { el = document.createElement('div'); el.id = '_sb_wrap'; document.body.appendChild(el); }
  injectScript(el, script);
}

/** Banner Ad — show/hide slot */
function applyBanner(script) {
  const slot  = $('bannerAdSlot');
  const inner = $('bannerAdInner');
  if (!slot || !inner) return;
  if (!script) { slot.classList.remove('show'); return; }
  slot.classList.add('show');
  injectScript(inner, script);
}

/** Popunder / Direct Link with session cooldown */
function triggerPopunder(url) {
  if (!url) return;
  const coolMs = (parseInt(adCfg.popunderCooldown) || 60) * 1000;
  const last   = parseInt(sessionStorage.getItem('_pu_t') || '0');
  if (Date.now() - last < coolMs) return;
  sessionStorage.setItem('_pu_t', String(Date.now()));
  try { window.open(url, '_blank'); } catch (e) {}
}

/** Show overlay with countdown before video */
function showOverlay(script) {
  const overlay  = $('adOverlay');
  const zone     = $('adOverlayZone');
  const skipBtn  = $('adSkipBtn');
  const timerEl  = $('adTimer');
  const skipText = $('adSkipText');

  if (script) {
    injectScript(zone, script);
  } else {
    zone.innerHTML = `
      <div style="color:#5a5a7a;text-align:center;font-size:13px;font-family:sans-serif">
        <div style="font-size:40px;margin-bottom:10px">📢</div>Advertisement
      </div>`;
  }

  overlay.classList.add('show');
  // History API — back চাপলে overlay skip হবে
  pushOverlayState();
  skipBtn.disabled = true;
  timerEl.style.display = 'inline-flex';
  skipText.textContent = 'Skip in';

  let count = parseInt(adCfg.skipDelay) || 5;
  timerEl.textContent = count;

  clearInterval(adTimer);
  adTimer = setInterval(() => {
    count--;
    timerEl.textContent = count;
    if (count <= 0) {
      clearInterval(adTimer);
      skipBtn.disabled = false;
      skipText.textContent = '▶ Watch Now';
      timerEl.style.display = 'none';
    }
  }, 1000);
}

/* ══ OPEN PLAYER ══ */
function openPlayer(video) {
  pendingVideo = video;

  // Fill UI
  const catEl = $('playerCat');
  catEl.textContent = video.category;
  catEl.className   = `player-cat ${catClass(video.category)}`;
  $('playerTitle').textContent = video.title;
  const local = allVideos.find(v => v.id === video.id);
  $('playerViewsText').textContent = fmtViews(local?.views || video.views || 0);
  $('dlBtn').href = video.downloadUrl || '#';
  $('shareBtn').onclick = () => {
    if (navigator.share) navigator.share({ title: video.title, url: location.href });
    else { navigator.clipboard?.writeText(location.href); showToast('🔗 Link copied!'); }
  };

  // Suggested videos
  const same   = allVideos.filter(v => v.id !== video.id && v.category === video.category)
                          .sort((a,b) => (b.views||0)-(a.views||0)).slice(0, 7);
  const others = allVideos.filter(v => v.id !== video.id && v.category !== video.category)
                          .sort(() => Math.random()-.5).slice(0, 3);

  $('sugList').innerHTML = [...same, ...others].slice(0, 10).map(sv => {
    const fb = makePlaceholder(sv.title, sv.category);
    const ts = sv.thumbnailUrl || fb;
    return `
      <div class="sug-card" data-id="${sv.id}">
        <div class="sug-thumb">
          <img src="${ts}" alt="${sv.title}" loading="lazy" onerror="this.src='${fb}'">

        </div>
      </div>`;
  }).join('') || `<p style="padding:20px;color:var(--muted);font-size:13px;text-align:center">No suggestions</p>`;

  $('sugList').onclick = e => {
    const card = e.target.closest('.sug-card');

  if (adCfg.overlayEnabled) {
    showOverlay(adCfg.overlayScript || null);
  } else {
    pendingVideo = null;
    startVideoPlayback(video);
  }
}

/* ══ START VIDEO ══ */
function startVideoPlayback(video) {
  const vid = $('mainVideo');
  vid.pause(); vid.src = video.videoUrl; vid.load();
  vid.play().catch(() => {});
  incrementView(video.id);
  const local = allVideos.find(v => v.id === video.id);
  if (local) local.views = (local.views || 0) + 1;
  $('playerViewsText').textContent = fmtViews(local?.views || video.views || 0);
}

/* ══ HISTORY / HARDWARE BACK BUTTON ══
   Stack logic:
     'home'   → home view দেখাচ্ছে
     'player' → player view দেখাচ্ছে
     'overlay'→ ad overlay দেখাচ্ছে

   Page load এ history stack:
     [base] ← always kept so browser doesn't close the app

   ভিডিও open হলে pushState('player')
   Hardware back চাপলে popstate fire হয়:
     - overlay open থাকলে → overlay বন্ধ করে video play
     - player open থাকলে → home এ ফেরায়
     - home এ থাকলে → pushState আবার দিয়ে app বন্ধ হওয়া আটকায়
══════════════════════════════════════ */

// Page load এ base state push করি — এটা থাকলে browser app close করে না
history.replaceState({ view: 'home' }, '');

function pushPlayerState() {
  history.pushState({ view: 'player' }, '');
}

function pushOverlayState() {
  history.pushState({ view: 'overlay' }, '');
}

window.addEventListener('popstate', e => {
  const view = e.state?.view;

  // ── Overlay খোলা আছে → skip/close overlay, video play করো ──
  if ($('adOverlay').classList.contains('show')) {
    window.skipAd();
    // player state এখনও আছে, তাই আবার push করতে হবে না
    history.pushState({ view: 'player' }, '');
    return;
  }

  // ── Player খোলা আছে → home এ ফেরো ──
  if ($('playerView').classList.contains('show')) {
    _closePlayer();
    // home state replace করি
    history.replaceState({ view: 'home' }, '');
    return;
  }

  // ── Home এ আছি → app বন্ধ হওয়া আটকাও ──
  // আবার base state push করি যেন পরের back এও handle করা যায়
  history.pushState({ view: 'home' }, '');
});

/* ── Player বন্ধ করার shared helper ── */
function _closePlayer() {
  clearInterval(adTimer);
  $('adOverlay').classList.remove('show');
  $('adTimer').style.display = 'inline-flex';
  pendingVideo = null;
  const vid = $('mainVideo'); vid.pause(); vid.src = '';
  $('playerView').classList.remove('show');
  $('homeView').style.display = '';
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
  const navMap = { Movie: 'bn-movie', Anime: 'bn-anime', Videos: 'bn-videos' };
  const activeNav = navMap[currentCat];
  if (activeNav) $(activeNav)?.classList.add('active');
  renderGrid();
}

/* ── In-app Back button (player এর ← বাটন) ── */
window.goHome = () => {
  // history.back() call করলে popstate fire হবে,
  // popstate handler ই _closePlayer() call করবে
  history.back();
};
$('backBtn').onclick = window.goHome;

/* ══ FILTER ══ */
window.filterCat = (cat, btn) => {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid();
};

window.filterAndGo = cat => {
  clearInterval(adTimer);
  $('adOverlay').classList.remove('show');
  $('adTimer').style.display = 'inline-flex';
  pendingVideo = null;
  const vid = $('mainVideo'); vid.pause(); vid.src = '';
  $('playerView').classList.remove('show');
  $('homeView').style.display = '';
  currentCat = cat;
  // Activate correct category pill
  const pill = document.querySelector(`.cat-pill[data-cat="${cat}"]`);
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  if (pill) pill.classList.add('active');
  // Activate correct nav button
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
  const m = { Movie: 'bn-movie', Anime: 'bn-anime', Videos: 'bn-videos' };
  if (m[cat]) $(m[cat])?.classList.add('active');
  renderGrid();
};

/* ══ SEARCH ══ */
window.handleSearch = q => { currentQ = q.toLowerCase(); renderGrid(); };
$('searchToggle').onclick = () => {
  $('searchBar').classList.toggle('open');
  if ($('searchBar').classList.contains('open')) $('searchInput').focus();
};

/* ══ MODAL ══ */
$('enterBtn').onclick = () => {
  $('welcomeModal').classList.remove('show');
  localStorage.setItem('fs_v', '1');
};

/* ══ FIREBASE LOAD ══ */

// 1) App settings (FB links + categories)
getDoc(doc(db, 'settings', 'config')).then(snap => {
  if (snap.exists()) {
    AppSettings = snap.data();
    $('fbPageLink').href  = AppSettings.facebookPage  || '#';
    $('fbGroupLink').href = AppSettings.facebookGroup || '#';
    dynamicCats = AppSettings.categories?.length
      ? AppSettings.categories
      : [{name:'Movie',emoji:'🎬'},{name:'Anime',emoji:'🌸'},{name:'Videos',emoji:'🎞️'}];
  } else {
    dynamicCats = [{name:'Movie',emoji:'🎬'},{name:'Anime',emoji:'🌸'},{name:'Videos',emoji:'🎞️'}];
  }
  buildCategoryPills(dynamicCats);
  if (!localStorage.getItem('fs_v')) $('welcomeModal').classList.add('show');
});

// 2) Ad config — realtime (admin changes apply instantly)
onSnapshot(doc(db, 'settings', 'ads'), snap => {
  if (snap.exists()) applyAdConfig(snap.data());
});

// 3) Videos — realtime
onSnapshot(collection(db, 'videos'), snap => {
  allVideos = [];
  snap.forEach(d => allVideos.push({ id: d.id, ...d.data() }));
  renderGrid();
});

// Set initial nav active state — Movies is first item
document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
$('bn-movie')?.classList.add('active');
</script>
</body>
</html>
